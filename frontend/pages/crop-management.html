<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Crop Tracking and Management</h1>
    </header>
    <main>
        <section>
            <h2>Current Crops</h2>
            <table id="crop-table">
                <thead>
                    <tr>
                        <th>Crop Name</th>
                        <th>Planting Date</th>
                        <th>Harvest Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Crop data will be populated here -->
                </tbody>
            </table>
        </section>
        <section>
            <h2>Add New Crop</h2>
            <form id="add-crop-form">
                <label for="crop-name">Crop Name:</label>
                <input type="text" id="crop-name" name="crop-name" required>
                <label for="planting-date">Planting Date:</label>
                <input type="date" id="planting-date" name="planting-date" required>
                <label for="harvest-date">Harvest Date:</label>
                <input type="date" id="harvest-date" name="harvest-date" required>
                <button type="submit">Add Crop</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Farm Tech Hub</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
